{% extends "base.html" %}
{% block content %}
            <div class="row justify-content-center mt-5">
                <div class="col-md-5">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h2 class="text-center mb-4">
                                Login
                            </h2>

                            <form method="POST">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label">
                                        Username
                                    </label>
                                    <input
                                        type="text"
                                        name="username"
                                        class="form-control"
                                    >
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">
                                        Password
                                    </label>
                                    <input
                                        type="password"
                                        name="password"
                                        class="form-control"
                                    >
                                </div>

                                <button
                                    class="btn btn-primary w-100"
                                    type="submit">
                                        Login
                                </button>
                            </form>
                            <p class="text-center mt-4">
                                Don't have an account?
                                <a href="/register/">
                                    Register
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
{% endblock %}
