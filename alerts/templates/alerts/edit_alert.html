{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body p-4">

                <h2 class="mb-4">
                    Edit Alert
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Ticker
                        </label>

                        <input
                            type="text"
                            name="ticker"
                            value="{{ alert.ticker }}"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Asset Type
                        </label>

                        <select class="form-select"
                            name="asset_type"
                            class="form-select">

                            <option value="stock">Stock</option>
                            <option value="crypto">Crypto</option>
                            <option value="gold">Gold</option>
                            <option value="forex">Forex</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Condition
                        </label>

                        <select class="form-select"
                            name="condition"
                            class="form-select">

                            <option value="below">Below</option>
                            <option value="above">Above</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Target Price
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="target_price"
                            value="{{ alert.target_price }}"
                            class="form-control">

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Update Alert

                    </button>

                    <a
                        href="/dashboard/"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
