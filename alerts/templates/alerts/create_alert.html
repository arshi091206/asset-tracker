{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}?v=3">
{% endblock %}

{% block body_class %}auth-page{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body p-4">

                <h2 class="mb-4">
                    Create Alert
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label for="company"class="form-label">
                            Company
                        </label>

                        <input
                            type="text"
                            id="company"
                            name="company"
                            class="form-control"
                            autocomplete="off"
                            placeholder="e.g. Infosys">

                        <div id="suggestions" class="list-group"></div>

                    </div>

                    <div class="mb-3">

                        <label for="asset-type" class="form-label">
                            Asset Type
                        </label>

                        <input
                            type="text"
                            id="asset-type"
                            class="form-control"
                            placeholder="Automatically detected"
                            readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Condition
                        </label>

                        <select
                            name="condition"
                            class="form-select">

                            <option value="below">Below</option>
                            <option value="above">Above</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Target Price
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="target_price"
                            class="form-control">

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Save Alert

                    </button>

                    <a
                        href="/dashboard/"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
const companyInput = document.getElementById('company');
const suggestionsDiv = document.getElementById('suggestions');
const assetTypeInput = document.getElementById('asset-type');

function setAssetType(asset) {
    assetTypeInput.value = asset.asset_type.charAt(0).toUpperCase() + asset.asset_type.slice(1);
}

companyInput.addEventListener("input",async function(){
    const query=companyInput.value.trim();
    assetTypeInput.value = "";

    if(query.length<2){
        suggestionsDiv.innerHTML="";
        return;
    }
    const response = await fetch(`/alerts/search/?q=${encodeURIComponent(query)}`);
    const assets = await response.json();
    suggestionsDiv.innerHTML = "";

    const exactMatch = assets.find((asset) => asset.name.toLowerCase() === query.toLowerCase());
    if (exactMatch) {
        setAssetType(exactMatch);
    }

    assets.forEach(asset=> {
    const item= document.createElement("button");
    item.type="button";
    item.className="list-group-item list-group-item-action";
    item.textContent=asset.name;

    item.addEventListener("click",function(){
        companyInput.value=asset.name;
        setAssetType(asset);
        suggestionsDiv.innerHTML="";
    });
    suggestionsDiv.appendChild(item);
});
});
</script>

{% endblock %}
