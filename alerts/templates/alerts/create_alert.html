<!DOCTYPE html>
<html>
    <body>
        <h1>Create Alert</h1>
        <form method=""POST">
            {% csrf_token %}
            <label>Ticker</label>

            <input
            type="text"
            name="ticker">

            <br><br>

            <label>Asset Type</label>

            <select name="asset_type">
            <option value="stock">
                Stock
            </option>
            <option value="crypto">
                Crypto
            </option>
            <option value="gold">
                Gold
            </option>
            <option value="forex">
                Forex
            </option>
            </select>
            <br><br>
            <label>Condition</label>
            <select name="condition">
                <option value="below">
                    Below
                </option>
                <option value="above">
                    Above
                </option>
            </select>
            <br><br>
            <label>Target Price</label>

            <input 
            type="number"
            step="0.01"
            name="target_price">

            <br><br>

            <button type="submit">
                Save Alert
            </button>
        </form>
    </body>
</html>
